version: '3.8'

services:
  ratings-aggregator:
    image: ghcr.io/aerya/rating-aggregator:latest
    container_name: stremio-ratings-aggregator
    restart: always
    environment:
      - CACHE_TTL_SECONDS=86400
      - LOG_LEVEL=debug
      - NODE_ENV=production
      - NODE_VERSION=18.20.8
      - PORT=61262
      - REDIS_URL=redis://:xxx@redis:6379
      - TMDB_API_KEY=xxx
      - YARN_VERSION=1.22.22
    ports:
      - 32860:61262
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:61262/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Redis container for local testing
  redis:
    image: redis:7-alpine
    container_name: ratings-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data: